<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Venture - Space Dispatcher Idle Puzzle</title>
    <!-- Pixi.js via ESM import map so `import { Application } from 'pixi.js'`
         resolves to the CDN bundle. Keeps the no-build deploy flow intact;
         GitHub Pages serves the HTML verbatim and the browser fetches
         pixi.mjs on first load. -->
    <script type="importmap">
    {
        "imports": {
            "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.mjs"
        }
    }
    </script>
    <style>
        /* Page is a full-viewport Pixi canvas mounted in #gameContainer.
           Every HUD panel, mission card, title bar, score readout, and
           preview is drawn by src/pixi-view.js. No DOM board, no DOM HUD,
           no DOM start screen, no DOM player-name input -- keeping this
           file down to a bare mount point avoids the pre-Pixi flash the
           old multi-panel layout used to cause. */
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }
        #gameContainer canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
