<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Collapse - Cosmic Block Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Pixi.js via ESM import map so `import { Application } from 'pixi.js'`
         resolves to the CDN bundle. Keeps the no-build deploy flow intact;
         GitHub Pages serves the HTML verbatim and the browser fetches
         pixi.mjs on first load. -->
    <script type="importmap">
    {
        "imports": {
            "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.mjs"
        }
    }
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at center, #0f1419 0%, #000510 70%, #000000 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        #playerName {
            position: absolute;
            z-index: 100;
            background: rgba(3, 10, 26, 0.9);
            color: #67e8f9;
            border: 1px solid rgba(34, 211, 238, 0.7);
            border-radius: 8px;
            padding: 10px 12px;
            text-align: center;
            outline: none;
            box-shadow: 0 0 14px rgba(34, 211, 238, 0.24);
        }
        #playerName:focus {
            border-color: #f9a8d4;
            box-shadow: 0 0 20px rgba(249, 168, 212, 0.35);
        }
        
        /* Starfield is drawn on the Pixi canvas (src/pixi-starfield.js);
           no DOM stars layer anymore. */

        /* Multi-layer game container system.
           box-sizing is forced to content-box here so the 300x600 cell grid
           fits exactly inside the border, independent of the Tailwind preflight
           *-border-box reset. Without this, the inner content area is 294x594
           which forces fractional 1fr cell sizes (27.6px wide, 27.8px tall)
           and causes the active-piece layer to drift sub-pixels out of sync
           with the locked-piece layer. */
        /* Fixed-shape slot that holds the board. Every field size
           centers inside this box so the overall three-column layout
           stays the same rectangle regardless of whether the player
           picked a 7x14 or 15x28 field. Width accommodates the widest
           board (15 cols * 25px = 375px) with breathing room. */
        .game-board-slot {
            width: 400px;
            height: 720px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .game-container {
            box-sizing: content-box;
            position: relative;
            /* PixiView resizes its canvas to the computed board
               dimensions after init(); these are fallback sizes for
               the brief pre-wire frame. */
            width: 360px;
            height: 720px;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            /* Glow dialed back from 30px/60px so the board outline stays
               crisp against the HUD panels instead of bleeding into them. */
            box-shadow:
                0 0 10px rgba(0, 212, 255, 0.35),
                0 0 22px rgba(0, 212, 255, 0.15);
            overflow: hidden;
            animation: borderPulse 4s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% {
                border-color: #00d4ff;
                box-shadow:
                    0 0 10px rgba(0, 212, 255, 0.35),
                    0 0 22px rgba(0, 212, 255, 0.15);
            }
            50% {
                border-color: #00b8e6;
                box-shadow:
                    0 0 14px rgba(0, 212, 255, 0.5),
                    0 0 28px rgba(0, 212, 255, 0.22);
            }
        }
        
        /* Layer 1: Static background grid (never changes, maximum performance) */
        .game-grid-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 128, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 20, 40, 0.9) 100%);
            z-index: 1;
            will-change: auto; /* Static layer - no animation optimization needed */
        }
        
        .game-grid-background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent 0px,
                    rgba(0, 212, 255, 0.03) 1px,
                    transparent 2px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    rgba(0, 212, 255, 0.03) 1px,
                    transparent 2px
                );
            pointer-events: none;
            opacity: 0.6;
        }
        
        /* Previously the background layer rendered a 45deg "scanner line"
           pseudo-element via mix-blend-mode: overlay + a translate
           animation. The blend mode produced visible gaps where the line
           crossed filled cells and the animation chewed compositing
           budget for a purely decorative touch. Dropped entirely -- the
           static ::before grid pattern is enough of a vibe. */
        
        /* Layer 2: Board state (locked pieces).
           Integer-pixel cell sizes (30px) with zero gap keep both grid layers
           deterministically aligned; any fractional-pixel rounding was a
           source of visible piece/board drift. The .cell border provides the
           thin divider line that gap: 2px used to give us. */
        .game-grid-board {
            position: absolute;
            top: 0;
            left: 0;
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(20, 30px);
            gap: 0;
            width: 300px;
            height: 600px;
            z-index: 2;
            will-change: contents; /* Only content changes, not transforms */
            pointer-events: auto; /* This layer should receive clicks */
        }
        
        /* Layer 3: Active falling piece.
           Same integer grid as the board layer so piece cells land on the
           exact same pixel boundaries as the locked cells beneath them. */
        .game-grid-active {
            position: absolute;
            top: 0;
            left: 0;
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(20, 30px);
            gap: 0;
            width: 300px;
            height: 600px;
            z-index: 3;
            will-change: transform; /* Optimized for movement animations */
            pointer-events: none; /* Don't interfere with board clicks */
        }
        
        /* Layer 4: Effects and animations */
        .game-grid-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
            will-change: opacity, transform; /* Optimized for effect animations */
        }
        
        /* Layer 5: UI overlay */
        .game-grid-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        
        /* Restore original game-grid styles for backward compatibility */
        .game-grid {
            box-sizing: content-box;
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(20, 30px);
            gap: 0;
            width: 300px;
            height: 600px;
            border: 3px solid #00d4ff;
            background: 
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 128, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 20, 40, 0.9) 100%);
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.5),
                inset 0 0 20px rgba(0, 212, 255, 0.1),
                0 0 60px rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            position: relative;
        }
        
        .game-grid::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent 0px,
                    rgba(0, 212, 255, 0.03) 1px,
                    transparent 2px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    rgba(0, 212, 255, 0.03) 1px,
                    transparent 2px
                );
            pointer-events: none;
            border-radius: 6px;
            opacity: 0.6;
            z-index: 3;
        }
        

        

        
        .cell {
            background: rgba(0, 212, 255, 0.02);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 2px;
            position: relative;
            /* border-box keeps cell borders inside the cell's fixed size so
               the grid stays pixel-aligned at any field size + block scale. */
            box-sizing: border-box;
            /* Performance optimizations for layered rendering */
            backface-visibility: hidden;
            transform: translateZ(0); /* Force hardware acceleration */
        }
        
        .cell:hover {
            background: rgba(0, 212, 255, 0.05);
        }
        
        .cell.filled {
            border: 1px solid rgba(0, 0, 0, 0.3);
            box-shadow: 
                inset 2px 2px 4px rgba(255, 255, 255, 0.2),
                inset -2px -2px 4px rgba(0, 0, 0, 0.5),
                0 2px 8px rgba(0, 0, 0, 0.3);
            cursor: pointer; /* Show it's clickable */
        }
        
        /* No transform on hover: the previous scale(1.05) briefly enlarged
           hovered board cells and made them appear misaligned with the
           active falling piece above them. Use a brightness bump and a
           richer glow instead so the click affordance is preserved without
           shifting the cell off its grid slot. */
        .cell.filled:hover {
            filter: brightness(1.15);
            box-shadow: 
                inset 2px 2px 4px rgba(255, 255, 255, 0.3),
                inset -2px -2px 4px rgba(0, 0, 0, 0.6),
                0 4px 12px rgba(0, 212, 255, 0.4);
        }

        /* Floating cells: a filled cell with an empty cell below it in its
           column. Only possible in COLLAPSED complexity, where match/bomb
           clears don't trigger gravity and survivors hang suspended until a
           snake unlocks them. We don't animate position (that would desync
           the grid for the click handler and the active-piece overlay) --
           just a cyan outline + gentle breathing glow so the player can see
           what's defying gravity. */
        .cell.filled.floating {
            outline: 1px dashed rgba(125, 211, 252, 0.8);
            outline-offset: -2px;
            animation: floatPulse 1.8s ease-in-out infinite;
        }

        /* Low-fx mode: applied to the board and active layers when the
           grid is big enough that per-cell pulse/glow animations tank
           framerate. The rules below disable the animated filters and
           keep the static gradient + inset shadows so colors and
           readability are preserved. */
        .low-fx .cell.filled.floating {
            animation: none;
            /* Keep the floating outline static so the player still sees
               which cells are suspended. */
            box-shadow:
                inset 2px 2px 4px rgba(255, 255, 255, 0.2),
                inset -2px -2px 4px rgba(0, 0, 0, 0.5),
                0 0 8px rgba(125, 211, 252, 0.4);
        }
        .low-fx .cell.bomb {
            animation: none;
        }
        .low-fx .cell.snake {
            animation: none;
            /* snakePulse's keyframes also drive transform: rotate+scale.
               Pin the rotation here so the icon stays diamond-shaped. */
            transform: rotate(45deg);
        }
        .low-fx .cell.filled:hover {
            /* Skip the filter on hover too -- hover transitions on a big
               board multiply into noticeable jank when the cursor sweeps
               across many filled cells. */
            filter: none;
        }
        @keyframes floatPulse {
            0%, 100% {
                filter: brightness(1);
                box-shadow:
                    inset 2px 2px 4px rgba(255, 255, 255, 0.2),
                    inset -2px -2px 4px rgba(0, 0, 0, 0.5),
                    0 2px 8px rgba(0, 0, 0, 0.3),
                    0 0 6px rgba(125, 211, 252, 0.35);
            }
            50% {
                filter: brightness(1.18);
                box-shadow:
                    inset 2px 2px 4px rgba(255, 255, 255, 0.3),
                    inset -2px -2px 4px rgba(0, 0, 0, 0.5),
                    0 2px 10px rgba(0, 0, 0, 0.3),
                    0 0 14px rgba(125, 211, 252, 0.7);
            }
        }

        
        /* Asteroid-like block styles */
        .cell.red { 
            background: 
                radial-gradient(circle at 30% 30%, #ff6b4a, #cc2200),
                radial-gradient(circle at 70% 80%, #aa1100, #660000),
                linear-gradient(135deg, #ff4400, #aa0000);
            box-shadow: 
                inset 3px 3px 6px rgba(255, 150, 100, 0.3),
                inset -3px -3px 6px rgba(80, 0, 0, 0.7),
                0 3px 12px rgba(255, 68, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }
        
        .cell.red::before {
            content: '🔥';
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 2px rgba(255, 100, 0, 0.8));
        }
        
        .cell.red::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 25% 25%, rgba(255, 180, 150, 0.4) 20%, transparent 40%),
                radial-gradient(circle at 75% 70%, rgba(120, 20, 0, 0.6) 15%, transparent 35%),
                radial-gradient(circle at 60% 30%, rgba(200, 50, 20, 0.3) 10%, transparent 25%);
            border-radius: 2px;
            z-index: 1;
        }
        
        .cell.blue { 
            background: 
                radial-gradient(circle at 35% 25%, #4a9eff, #0055cc),
                radial-gradient(circle at 65% 75%, #0044aa, #002266),
                linear-gradient(145deg, #3388ff, #0044aa);
            box-shadow: 
                inset 3px 3px 6px rgba(150, 200, 255, 0.3),
                inset -3px -3px 6px rgba(0, 30, 80, 0.7),
                0 3px 12px rgba(68, 136, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }
        
        .cell.blue::before {
            content: '💎';
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 2px rgba(0, 150, 255, 0.8));
        }
        
        .cell.blue::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 40%, rgba(150, 220, 255, 0.4) 20%, transparent 40%),
                radial-gradient(circle at 80% 60%, rgba(0, 50, 120, 0.6) 15%, transparent 35%),
                radial-gradient(circle at 45% 20%, rgba(50, 150, 200, 0.3) 10%, transparent 25%);
            border-radius: 2px;
            z-index: 1;
        }
        
        .cell.green { 
            background: 
                radial-gradient(circle at 40% 30%, #4aff6b, #00cc22),
                radial-gradient(circle at 60% 80%, #00aa11, #006600),
                linear-gradient(125deg, #44ff00, #00aa44);
            box-shadow: 
                inset 3px 3px 6px rgba(150, 255, 180, 0.3),
                inset -3px -3px 6px rgba(0, 80, 30, 0.7),
                0 3px 12px rgba(68, 255, 100, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }
        
        .cell.green::before {
            content: '🌟';
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 2px rgba(100, 255, 100, 0.8));
        }
        
        .cell.green::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 30%, rgba(180, 255, 200, 0.4) 20%, transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(20, 120, 40, 0.6) 15%, transparent 35%),
                radial-gradient(circle at 50% 60%, rgba(80, 200, 100, 0.3) 10%, transparent 25%);
            border-radius: 2px;
            z-index: 1;
        }
        
        .cell.yellow { 
            background: 
                radial-gradient(circle at 30% 40%, #ffeb4a, #cc9900),
                radial-gradient(circle at 70% 70%, #aa7700, #664400),
                linear-gradient(155deg, #ffdd00, #aa7700);
            box-shadow: 
                inset 3px 3px 6px rgba(255, 240, 150, 0.3),
                inset -3px -3px 6px rgba(80, 60, 0, 0.7),
                0 3px 12px rgba(255, 221, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }
        
        .cell.yellow::before {
            content: '⚡';
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 2px rgba(255, 255, 100, 0.8));
        }
        
        .cell.yellow::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 35% 25%, rgba(255, 250, 180, 0.4) 20%, transparent 40%),
                radial-gradient(circle at 75% 75%, rgba(120, 80, 0, 0.6) 15%, transparent 35%),
                radial-gradient(circle at 55% 45%, rgba(200, 160, 50, 0.3) 10%, transparent 25%);
            border-radius: 2px;
            z-index: 1;
        }
        
        .cell.bomb { 
            background: 
                radial-gradient(circle at 30% 30%, #ff4444, #990000),
                radial-gradient(circle at 70% 70%, #660000, #330000),
                linear-gradient(135deg, #cc0000, #440000);
            box-shadow: 
                inset 3px 3px 6px rgba(255, 100, 100, 0.3),
                inset -3px -3px 6px rgba(60, 0, 0, 0.7),
                0 3px 12px rgba(255, 0, 0, 0.6),
                0 0 20px rgba(255, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            animation: bombPulse 1s ease-in-out infinite;
        }
        
        @keyframes bombPulse {
            0%, 100% { 
                box-shadow: 
                    inset 3px 3px 6px rgba(255, 100, 100, 0.3),
                    inset -3px -3px 6px rgba(60, 0, 0, 0.7),
                    0 3px 12px rgba(255, 0, 0, 0.6),
                    0 0 20px rgba(255, 0, 0, 0.4);
            }
            50% { 
                box-shadow: 
                    inset 3px 3px 6px rgba(255, 100, 100, 0.5),
                    inset -3px -3px 6px rgba(60, 0, 0, 0.9),
                    0 3px 12px rgba(255, 0, 0, 0.8),
                    0 0 30px rgba(255, 0, 0, 0.6);
            }
        }
        
        .cell.bomb::before {
            content: '💣';
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 2px rgba(255, 0, 0, 0.8));
        }
        
        .cell.bomb::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 35% 25%, rgba(255, 100, 100, 0.4) 20%, transparent 40%),
                radial-gradient(circle at 75% 75%, rgba(120, 0, 0, 0.6) 15%, transparent 35%),
                radial-gradient(circle at 55% 45%, rgba(200, 50, 50, 0.3) 10%, transparent 25%);
            border-radius: 2px;
            z-index: 1;
        }
        
        .cell.snake { 
            background: 
                radial-gradient(circle at 30% 30%, #00ff88, #006644),
                radial-gradient(circle at 70% 70%, #004433, #002211),
                linear-gradient(45deg, #00cc66, #004433);
            box-shadow: 
                inset 3px 3px 6px rgba(100, 255, 150, 0.3),
                inset -3px -3px 6px rgba(0, 60, 30, 0.7),
                0 3px 12px rgba(0, 255, 100, 0.6),
                0 0 20px rgba(0, 255, 100, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            animation: snakePulse 1.5s ease-in-out infinite;
            transform: rotate(45deg);
        }
        
        @keyframes snakePulse {
            0%, 100% { 
                box-shadow: 
                    inset 3px 3px 6px rgba(100, 255, 150, 0.3),
                    inset -3px -3px 6px rgba(0, 60, 30, 0.7),
                    0 3px 12px rgba(0, 255, 100, 0.6),
                    0 0 20px rgba(0, 255, 100, 0.4);
                transform: rotate(45deg) scale(1);
            }
            50% { 
                box-shadow: 
                    inset 3px 3px 6px rgba(100, 255, 150, 0.5),
                    inset -3px -3px 6px rgba(0, 60, 30, 0.9),
                    0 3px 12px rgba(0, 255, 100, 0.8),
                    0 0 30px rgba(0, 255, 100, 0.6);
                transform: rotate(45deg) scale(1.05);
            }
        }
        
        .cell.snake::before {
            content: '🐍';
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 2px rgba(0, 255, 100, 0.8));
            transform: rotate(-45deg);
        }
        
        .cell.snake::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 35% 25%, rgba(100, 255, 150, 0.4) 20%, transparent 40%),
                radial-gradient(circle at 75% 75%, rgba(0, 120, 60, 0.6) 15%, transparent 35%),
                radial-gradient(circle at 55% 45%, rgba(50, 200, 100, 0.3) 10%, transparent 25%);
            border-radius: 2px;
            z-index: 1;
        }
        
        /* Previews (NEXT + COMING UP) render as real 4x4 board cells so
           the upcoming piece looks identical to the pieces on the board.
           Integer 30px cells with gap: 0 mirror the main grid. */
        .preview {
            box-sizing: content-box;
            display: grid;
            grid-template-columns: repeat(4, 30px);
            grid-template-rows: repeat(4, 30px);
            gap: 0;
            width: 120px;
            height: 120px;
            border: 2px solid #00d4ff;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 20, 40, 0.9) 100%);
            box-shadow:
                0 0 20px rgba(0, 212, 255, 0.4),
                inset 0 0 15px rgba(0, 212, 255, 0.1);
            border-radius: 6px;
        }

        .preview-small {
            box-sizing: content-box;
            display: grid;
            grid-template-columns: repeat(4, 22px);
            grid-template-rows: repeat(4, 22px);
            gap: 0;
            width: 88px;
            height: 88px;
            border: 1px solid #00d4ff;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 20, 40, 0.7) 100%);
            box-shadow:
                0 0 10px rgba(0, 212, 255, 0.2),
                inset 0 0 8px rgba(0, 212, 255, 0.05);
            border-radius: 4px;
        }

        /* Shrink the small previews' cell font so the 22px cells don't
           get cropped by the normal 16px board-cell emoji. The larger
           NEXT preview keeps the board's native font-size. */
        .preview-small .cell.preview-slot::before {
            font-size: 11px;
        }
        
        /* Previews used to have their own color styles; they now reuse
           `.cell` so every color/emoji treatment lives in a single place. */

        
        .screen {
            transition: all 0.5s ease;
        }
        
        .btn {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        

        
        .score-animation {
            animation: scorePulse 0.5s ease;
        }
        
        @keyframes scorePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .highlight {
            box-shadow: 
                0 0 25px 8px rgba(255, 255, 255, 0.9),
                0 0 35px 12px rgba(0, 212, 255, 0.7),
                0 0 45px 16px rgba(255, 0, 128, 0.5);
            z-index: 10;
            animation: asteroidExplode 0.6s ease-in-out;
            transform: scale(1.1);
        }
        
        @keyframes asteroidExplode {
            0% { 
                transform: scale(1);
                box-shadow: 
                    0 0 5px 2px rgba(255, 255, 255, 0.3),
                    0 0 10px 4px rgba(0, 212, 255, 0.2);
            }
            50% { 
                transform: scale(1.15) rotate(5deg);
                box-shadow: 
                    0 0 30px 10px rgba(255, 255, 255, 1),
                    0 0 40px 15px rgba(0, 212, 255, 0.8),
                    0 0 50px 20px rgba(255, 0, 128, 0.6);
            }
            100% { 
                transform: scale(1.1) rotate(-2deg);
                box-shadow: 
                    0 0 25px 8px rgba(255, 255, 255, 0.9),
                    0 0 35px 12px rgba(0, 212, 255, 0.7),
                    0 0 45px 16px rgba(255, 0, 128, 0.5);
            }
        }
        
        /* Special effect for filled cells */
        .cell.filled::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: 
                radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 60%),
                radial-gradient(circle at 30% 70%, rgba(255, 255, 255, 0.05) 0%, transparent 40%);
            border-radius: 1px;
            pointer-events: none;
        }
        

        
        /* PixiView draws the title bar, HUD columns, starfield, and
           in-game top controls inside its canvas -- the equivalent DOM
           markup is left in place (game-title-bar, .hud-column) but hidden.
           The .game-board-slot stretches to full HUD width so the canvas
           can draw the side panels. */
        .game-title-bar,
        .hud-column {
            display: none !important;
        }
        .game-board-slot {
            width: auto;
        }
        #gameScreen .flex.gap-6 {
            gap: 0 !important;
        }
        #gameScreen > .absolute.top-4.right-4 {
            display: none !important;
        }
        /* Holographic effects for UI panels */
        .hologram-panel {
            background: 
                linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(255, 0, 128, 0.05) 100%),
                rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 
                0 0 15px rgba(0, 212, 255, 0.1),
                inset 0 0 15px rgba(0, 212, 255, 0.03);
            border-radius: 6px;
            position: relative;
        }
        
        .hologram-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    rgba(0, 212, 255, 0.02) 1px,
                    transparent 2px
                );
            pointer-events: none;
            border-radius: 5px;
        }
        
        /* Enhanced score display */
        .score-display {
            color: #00d4ff;
            text-shadow: 
                0 0 10px rgba(0, 212, 255, 0.8),
                0 0 20px rgba(0, 212, 255, 0.5),
                0 0 30px rgba(0, 212, 255, 0.3);
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        
        /* Glowing text for headers */
        .glow-text {
            text-shadow: 
                0 0 5px currentColor,
                0 0 10px currentColor,
                0 0 15px currentColor,
                0 0 20px currentColor;
        }

        /* ---- In-game title bar (above the board) ---------------------- */
        /* Matches the start-screen headline (same gradient + icon) so the
           two screens feel continuous. The star here is bigger than the
           start-screen one because it's also the "game actor" that
           flashes on gameplay events -- see .title-star--* below. */
        .game-title-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .game-title-bar h1 {
            font-size: 2.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #22d3ee, #facc15, #f87171);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 18px rgba(250, 204, 21, 0.15);
        }
        .title-star {
            font-size: 2.5rem;
            color: #facc15;
            filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.8))
                    drop-shadow(0 0 22px rgba(250, 204, 21, 0.35));
            transform-origin: center;
            transition:
                color 0.25s ease,
                filter 0.25s ease,
                transform 0.25s ease;
            will-change: transform, filter;
        }
        /* Idle pulse so the star looks alive even when nothing's happening. */
        .title-star:not(.title-star--reacting) {
            animation: titleStarIdle 3.5s ease-in-out infinite;
        }
        @keyframes titleStarIdle {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.08); }
        }
        /* Event-specific reactions. A single .title-star--reacting class
           disables the idle pulse; the modifier picks the animation. */
        .title-star--reacting { animation-play-state: paused; }
        .title-star--lock    { animation: titleStarLock 0.28s ease-out; }
        .title-star--line    { animation: titleStarLine 0.55s ease-out;    color: #22d3ee; }
        .title-star--match   { animation: titleStarMatch 0.55s ease-out;   color: #34d399; }
        .title-star--bomb    { animation: titleStarBomb 0.75s ease-out;    color: #f97316; }
        .title-star--snake   { animation: titleStarSnake 0.9s ease-in-out; color: #a855f7; }
        .title-star--gameover{ animation: titleStarDown 0.9s ease-out;     color: #f87171; }
        .title-star--levelup { animation: titleStarLevel 0.75s ease-out;   color: #fde68a; }
        @keyframes titleStarLock {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        @keyframes titleStarLine {
            0%   { transform: scale(1) rotate(0deg); }
            50%  { transform: scale(1.35) rotate(12deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes titleStarMatch {
            0%   { transform: scale(1); filter: drop-shadow(0 0 8px rgba(52, 211, 153, 0.7)); }
            50%  { transform: scale(1.5); filter: drop-shadow(0 0 22px rgba(52, 211, 153, 1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(52, 211, 153, 0.7)); }
        }
        @keyframes titleStarBomb {
            0%   { transform: scale(1) rotate(0deg); }
            25%  { transform: scale(1.55) rotate(-10deg); }
            50%  { transform: scale(0.9)  rotate(10deg); }
            75%  { transform: scale(1.35) rotate(-6deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes titleStarSnake {
            0%   { transform: scale(1) rotate(0deg); }
            25%  { transform: scale(1.2) rotate(-25deg); }
            50%  { transform: scale(1.1) rotate(25deg); }
            75%  { transform: scale(1.2) rotate(-15deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes titleStarLevel {
            0%   { transform: scale(1)   rotate(0deg); filter: drop-shadow(0 0 8px rgba(253, 230, 138, 0.7)); }
            50%  { transform: scale(1.6) rotate(180deg); filter: drop-shadow(0 0 26px rgba(253, 230, 138, 1)); }
            100% { transform: scale(1)   rotate(360deg); filter: drop-shadow(0 0 8px rgba(253, 230, 138, 0.7)); }
        }
        @keyframes titleStarDown {
            0%   { transform: scale(1)   rotate(0deg);   opacity: 1; }
            100% { transform: scale(0.6) rotate(-90deg); opacity: 0.45; }
        }

        /* ---- HUD side columns ----------------------------------------- */
        /* Both side columns are the same narrow width so left (LEVEL +
           NEXT) and right (SCORE + TIPS + CONTROLS) visually balance the
           board. Width matches the preview block below it (4x30 + padding). */
        .hud-column {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 176px;
        }
        .hud-panel {
            padding: 0.75rem;
        }
        .hud-panel h2,
        .hud-panel h3,
        .hud-panel h4 {
            letter-spacing: 1px;
        }
        .hud-stat-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .hud-stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .hud-multiplier {
            display: inline-block;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid currentColor;
            margin-top: 4px;
        }
        .hud-tip-text {
            font-size: 0.8rem;
            line-height: 1.35;
            color: #cbd5f5;
            min-height: 3.5em;
        }
        .hud-controls-row {
            font-size: 0.78rem;
        }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-4">
    <input type="text" id="playerName" placeholder="Pilot" maxlength="15" value="Pilot">

    <!-- Game Screen -->
    <div id="gameScreen" class="screen absolute inset-0 flex flex-col items-center justify-center">
        <!-- End Game Button -->
        <div class="absolute top-4 right-4 flex gap-2">
            <button id="soundToggleBtn" class="btn bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-full transition-colors">
                <i id="soundToggleIcon" class="fas fa-volume-up mr-2"></i><span id="soundToggleText">Sound ON</span>
            </button>
            <button id="endGameBtn" class="btn bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-full transition-colors">
                <i class="fas fa-sign-out-alt mr-2"></i>Exit Mission
            </button>
        </div>
        
        <div class="flex flex-col items-center">
            <!-- Shiny title (mirrors start screen) with a bigger star that
                 reacts to gameplay events -- see main.js star actor. -->
            <div class="game-title-bar">
                <i id="titleStar" class="fas fa-star title-star"></i>
                <h1 class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-yellow-400 to-red-400">
                    STELLAR COLLAPSE
                </h1>
            </div>

            <div class="flex gap-6 items-start">
                <!-- LEFT COLUMN: Level (top) + previews (bottom) share the
                     same narrow width so the stack feels like one object. -->
                <div class="hud-column">
                    <div class="hologram-panel hud-panel text-center">
                        <div class="hud-stat-label glow-text text-blue-300">LEVEL</div>
                        <div id="level" class="hud-stat-value score-display">1</div>
                        <div id="levelInfo" class="text-xs text-blue-200 mt-1">Cosmic dust</div>
                        <div class="text-[0.7rem] text-blue-300 mt-1" id="levelProgress">0 / 8 lines</div>
                    </div>

                    <div class="hologram-panel hud-panel text-center">
                        <h3 class="font-bold glow-text text-cyan-300 mb-2">NEXT</h3>
                        <div class="preview mx-auto" id="nextPiece"></div>

                        <h4 class="text-cyan-400 text-xs font-bold mt-3 mb-2">COMING UP</h4>
                        <div class="space-y-2">
                            <div class="preview-small mx-auto" id="nextPiece2"></div>
                            <div class="preview-small mx-auto" id="nextPiece3"></div>
                            <div class="preview-small mx-auto" id="nextPiece4"></div>
                        </div>
                    </div>
                </div>

                <!-- CENTER: fixed-shape slot so the outer UI rectangle
                     stays the same across all field sizes; the board
                     centers inside. -->
                <div class="game-board-slot">
                    <!-- Multi-layer game container -->
                    <div class="game-container" id="gameContainer" style="visibility: hidden;">
                        <!-- Layer 1: Static background grid -->
                        <div class="game-grid-background" id="gridBackground"></div>

                        <!-- Layer 2: Locked pieces (board state) -->
                        <div class="game-grid-board" id="gameBoard"></div>

                        <!-- Layer 3: Active/falling piece -->
                        <div class="game-grid-active" id="activePiece"></div>

                        <!-- Layer 4: Effects and animations -->
                        <div class="game-grid-effects" id="gameEffects"></div>

                        <!-- Layer 5: UI overlay -->
                        <div class="game-grid-ui" id="gameUI"></div>
                    </div>
                </div>

                <!-- RIGHT COLUMN: Score/Lines (top) + Tips (middle) +
                     Controls (bottom). -->
                <div class="hud-column">
                    <div class="hologram-panel hud-panel text-center">
                        <div class="hud-stat-label glow-text text-yellow-300">SCORE</div>
                        <div id="score" class="hud-stat-value score-display">0</div>
                        <div class="border-t border-cyan-900 my-2"></div>
                        <div class="hud-stat-label glow-text text-green-300">LINES</div>
                        <div id="lines" class="hud-stat-value score-display">0</div>
                        <div class="border-t border-cyan-900 my-2"></div>
                        <div class="hud-stat-label glow-text text-pink-300">MULTIPLIER</div>
                        <div id="multiplier" class="hud-multiplier text-pink-300" title="Score multiplier: difficulty × level">×1.0</div>
                    </div>

                    <div class="hologram-panel hud-panel">
                        <h3 class="text-center font-bold glow-text text-cyan-300 mb-2">MISSION TIP</h3>
                        <p id="levelTip" class="hud-tip-text text-center">Drop pieces to clear lines and climb the tier.</p>
                    </div>

                    <div class="hologram-panel hud-panel">
                        <h3 class="text-center font-bold glow-text text-cyan-300 mb-2">CONTROLS</h3>
                        <div class="space-y-1 hud-controls-row">
                            <p class="flex items-center"><i class="fas fa-arrow-up text-yellow-300 mr-2 w-4"></i> Rotate</p>
                            <p class="flex items-center"><i class="fas fa-arrow-left text-yellow-300 mr-2 w-4"></i> Move Left</p>
                            <p class="flex items-center"><i class="fas fa-arrow-right text-yellow-300 mr-2 w-4"></i> Move Right</p>
                            <p class="flex items-center"><i class="fas fa-arrow-down text-yellow-300 mr-2 w-4"></i> Soft Drop</p>
                            <p class="flex items-center"><i class="fas fa-space-shuttle text-yellow-300 mr-2 w-4"></i> Hard Drop</p>
                            <p class="flex items-center" id="matchControlHint"><i class="fas fa-mouse-pointer text-yellow-300 mr-2 w-4"></i><span id="matchControlHintText">Match 4+ Colors</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <script type="module" src="src/main.js"></script>
</body>
</html>
