name: Tests

# Runs the node --test suite on every push and PR. The repo has no build
# step and no npm dependencies, so this is just "install node, run tests".

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
